<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" required minlength="3">
        <label for="email" required>Email:</label>
        <input type="email" id="email" required placeholder="user@example.com">
        <label for="telefone">Telefone:</label>
        <!-- <input type="tel" id="telefone" pattern="\d{3}-\d{3}-\d{4}" placeholder="123-456-7890"> -->
        <input type="tel" id="telefone" pattern="[0-9]{10,11}" placeholder="(48)1121-1234">
        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" rows="4"></textarea>
        <button type="submit">Enviar</button>
    </form>
</body>

</html>
